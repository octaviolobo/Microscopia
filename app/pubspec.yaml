name: microlaudo
description: "MicroLaudo - Relatórios de Microscopia Vaginal"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Navegação
  go_router: ^14.0.0

  # Estado
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Supabase (auth + banco)
  supabase_flutter: ^2.8.4

  # HTTP / API
  dio: ^5.7.0

  # Imagens
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # Armazenamento local
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.2

  # UI
  google_fonts: ^6.2.1

  # Utilitários
  intl: ^0.20.1
  uuid: ^4.5.1
  open_filex: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
